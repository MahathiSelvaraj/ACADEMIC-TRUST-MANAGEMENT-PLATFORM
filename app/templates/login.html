{% extends "base.html" %}
{% block title %}Login | Academic Trust Platform{% endblock %}
{% block content %}
<section class="card form-card">
    <h2>Login</h2>
    <form method="POST" class="form-grid">
        <label for="role">Login As</label>
        <select id="role" name="role" required>
            <option value="user">User</option>
            <option value="institution">Institution</option>
            <option value="admin">Admin</option>
        </select>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <button class="btn primary" type="submit">Login</button>
    </form>
    <p class="helper-text">New user? <a href="{{ url_for('register') }}">Create account</a>.</p>
    <p class="helper-text"><a href="{{ url_for('forgot_password') }}">Forgot password?</a></p>
    <p class="helper-text"><strong>Default admin:</strong> admin@trust.com / admin123</p>
</section>
{% endblock %}
