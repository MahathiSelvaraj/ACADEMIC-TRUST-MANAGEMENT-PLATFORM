{% extends "base.html" %}
{% block title %}Forgot Password | Academic Trust Platform{% endblock %}
{% block content %}
<section class="card form-card">
    <h2>Forgot Password</h2>
    <p>Enter your registered email to generate a reset link.</p>
    <form method="POST" class="form-grid">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>
        <button class="btn primary" type="submit">Generate Reset Link</button>
    </form>
    <p class="helper-text"><a href="{{ url_for('login') }}">Back to login</a></p>
</section>
{% endblock %}
